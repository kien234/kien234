<svg width="850" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .s-bg { fill: #0D1117; }
      .s-border { stroke: #30363D; stroke-width: 1; fill: none; }
      .s-title {
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        fill: #00F2FF;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      
      .s-label {
        font-family: monospace;
        font-size: 13px;
        fill: #A9B1D6;
      }
      .s-pct {
        font-family: monospace;
        font-size: 12px;
        fill: #555;
      }
      
      /* Track */
      .track { fill: #161B22; rx: 4; }
      
      /* Bar animations */
      .bar-ai {
        fill: url(#grad-ai);
        rx: 4;
        animation: fillAI 2s ease forwards 0.5s;
        transform: scaleX(0);
        transform-origin: left;
      }
      .bar-prompt {
        fill: url(#grad-cyan);
        rx: 4;
        animation: fillPrompt 2s ease forwards 0.7s;
        transform: scaleX(0);
        transform-origin: left;
      }
      .bar-debug {
        fill: url(#grad-purple);
        rx: 4;
        animation: fillDebug 2s ease forwards 0.9s;
        transform: scaleX(0);
        transform-origin: left;
      }
      .bar-manual {
        fill: #30363D;
        rx: 4;
        animation: fillManual 1.5s ease forwards 1.1s;
        transform: scaleX(0);
        transform-origin: left;
      }
      .bar-auto {
        fill: url(#grad-green);
        rx: 4;
        animation: fillAuto 2s ease forwards 1.3s;
        transform: scaleX(0);
        transform-origin: left;
      }
      
      @keyframes fillAI     { to { transform: scaleX(1); } }
      @keyframes fillPrompt { to { transform: scaleX(1); } }
      @keyframes fillDebug  { to { transform: scaleX(1); } }
      @keyframes fillManual { to { transform: scaleX(1); } }
      @keyframes fillAuto   { to { transform: scaleX(1); } }
      
      /* Glow pulse on the AI bar */
      .glow-overlay {
        fill: rgba(0,242,255,0.15);
        rx: 4;
        animation: glowPulse 2s ease-in-out infinite 2.5s;
        opacity: 0;
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      
      /* Status indicator */
      .status-dot {
        fill: #00FF9D;
        animation: statusPulse 1.5s ease-in-out infinite;
      }
      @keyframes statusPulse {
        0%, 100% { r: 4; opacity: 1; }
        50% { r: 6; opacity: 0.6; }
      }
      
      .s-note {
        font-family: monospace;
        font-size: 11px;
        fill: #555;
        font-style: italic;
      }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#F7768E" />
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FF" />
      <stop offset="100%" stop-color="#00FF9D" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#00F2FF" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9D" />
      <stop offset="100%" stop-color="#00F2FF" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect class="s-bg" width="850" height="320" rx="10" />
  <rect class="s-border" x="0.5" y="0.5" width="849" height="319" rx="10" />
  
  <!-- Section title -->
  <text class="s-title" x="25" y="35">&#9608; System Capabilities</text>
  <line x1="25" y1="45" x2="825" y2="45" stroke="#30363D" stroke-width="1" />
  
  <!-- Skill 1: AI Augmented Development - 100% -->
  <text class="s-label" x="25" y="80">AI Augmented Development</text>
  <text class="s-pct" x="790" y="80" text-anchor="end">100%</text>
  <rect class="track" x="25" y="88" width="800" height="10" rx="4" />
  <rect class="bar-ai" x="25" y="88" width="800" height="10" />
  <rect class="glow-overlay" x="25" y="88" width="800" height="10" />
  
  <!-- Skill 2: Prompt Engineering - 95% -->
  <text class="s-label" x="25" y="130">Prompt Engineering</text>
  <text class="s-pct" x="790" y="130" text-anchor="end">95%</text>
  <rect class="track" x="25" y="138" width="800" height="10" rx="4" />
  <rect class="bar-prompt" x="25" y="138" width="760" height="10" />
  
  <!-- Skill 3: AI Debugging - 85% -->
  <text class="s-label" x="25" y="180">AI-Assisted Debugging</text>
  <text class="s-pct" x="790" y="180" text-anchor="end">85%</text>
  <rect class="track" x="25" y="188" width="800" height="10" rx="4" />
  <rect class="bar-debug" x="25" y="188" width="680" height="10" />
  
  <!-- Skill 4: Manual Coding - 0% -->
  <text class="s-label" x="25" y="230">Manual Coding</text>
  <text class="s-pct" x="790" y="230" text-anchor="end">0%</text>
  <rect class="track" x="25" y="238" width="800" height="10" rx="4" />
  <rect class="bar-manual" x="25" y="238" width="3" height="10" />
  
  <!-- Skill 5: Automation - 90% -->
  <text class="s-label" x="25" y="280">Workflow Automation</text>
  <text class="s-pct" x="790" y="280" text-anchor="end">90%</text>
  <rect class="track" x="25" y="288" width="800" height="10" rx="4" />
  <rect class="bar-auto" x="25" y="288" width="720" height="10" />
  
  <!-- Status indicator -->
  <circle class="status-dot" cx="815" cy="30" r="4" />
  <text class="s-note" x="425" y="315" text-anchor="middle">// All systems nominal. Neural link active.</text>
</svg>

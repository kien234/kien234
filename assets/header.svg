<svg width="850" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      
      /* Main name text */
      .name {
        font-family: monospace;
        font-size: 42px;
        font-weight: bold;
        fill: #00F2FF;
        filter: drop-shadow(0 0 12px #00F2FF) drop-shadow(0 0 30px rgba(0,242,255,0.4));
      }
      
      /* Glitch layers */
      .glitch-r {
        font-family: monospace;
        font-size: 42px;
        font-weight: bold;
        fill: #ff003c;
        opacity: 0;
        animation: glitchR 4s infinite;
      }
      .glitch-b {
        font-family: monospace;
        font-size: 42px;
        font-weight: bold;
        fill: #7000FF;
        opacity: 0;
        animation: glitchB 4s infinite;
      }
      
      @keyframes glitchR {
        0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
        91% { opacity: 0.8; transform: translate(3px, -2px); }
        92% { opacity: 0; }
        93% { opacity: 0.6; transform: translate(-2px, 1px); }
        94% { opacity: 0; }
      }
      @keyframes glitchB {
        0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
        91.5% { opacity: 0.7; transform: translate(-3px, 2px); }
        92.5% { opacity: 0; }
        93.5% { opacity: 0.5; transform: translate(2px, -1px); }
        94.5% { opacity: 0; }
      }
      
      /* Subtitle */
      .subtitle {
        font-family: monospace;
        font-size: 16px;
        fill: #A9B1D6;
        opacity: 0;
        animation: fadeIn 1s ease forwards 0.5s;
      }
      
      /* Role tag */
      .role {
        font-family: monospace;
        font-size: 14px;
        fill: #00FF9D;
        opacity: 0;
        animation: fadeIn 1s ease forwards 1s;
      }
      
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      
      /* Scan line */
      .scanline {
        fill: rgba(0, 242, 255, 0.08);
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
      }
      
      /* Corner decorations */
      .corner {
        stroke: #00F2FF;
        stroke-width: 2;
        fill: none;
        opacity: 0.5;
      }
      
      /* Blinking cursor */
      .cursor {
        fill: #00F2FF;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      /* Decorative dots */
      .dot {
        fill: #00F2FF;
        opacity: 0.3;
        animation: pulse 2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.3s; }
      .dot:nth-child(3) { animation-delay: 0.6s; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }
      
      /* Border glow */
      .border-line {
        stroke: #00F2FF;
        stroke-width: 1;
        fill: none;
        opacity: 0.3;
        stroke-dasharray: 8 4;
        animation: dash 20s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -200; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="850" height="200" rx="10" />
  
  <!-- Border -->
  <rect class="border-line" x="2" y="2" width="846" height="196" rx="10" />
  
  <!-- Scan line effect -->
  <rect class="scanline" x="0" y="0" width="850" height="4" />
  
  <!-- Corner decorations -->
  <polyline class="corner" points="20,5 5,5 5,25" />
  <polyline class="corner" points="830,5 845,5 845,25" />
  <polyline class="corner" points="20,195 5,195 5,175" />
  <polyline class="corner" points="830,195 845,195 845,175" />
  
  <!-- Decorative dots left -->
  <circle class="dot" cx="30" cy="100" r="2" />
  <circle class="dot" cx="30" cy="110" r="2" />
  <circle class="dot" cx="30" cy="120" r="2" />
  
  <!-- Terminal prefix -->
  <text x="50" y="60" font-family="monospace" font-size="12" fill="#555">root@kien234:~$</text>
  
  <!-- Main name with glitch -->
  <text class="name" x="425" y="105" text-anchor="middle">NGUYEN VAN KIEN</text>
  <text class="glitch-r" x="425" y="105" text-anchor="middle">NGUYEN VAN KIEN</text>
  <text class="glitch-b" x="425" y="105" text-anchor="middle">NGUYEN VAN KIEN</text>
  
  <!-- Subtitle -->
  <text class="subtitle" x="425" y="140" text-anchor="middle">
    &gt; Initializing neural interface...
    <tspan class="cursor" dx="5">_</tspan>
  </text>
  
  <!-- Role -->
  <text class="role" x="425" y="170" text-anchor="middle">[ AI-AUGMENTED DEVELOPER // SYSTEM ARCHITECT ]</text>
  
  <!-- Decorative dots right -->
  <circle class="dot" cx="820" cy="100" r="2" />
  <circle class="dot" cx="820" cy="110" r="2" />
  <circle class="dot" cx="820" cy="120" r="2" />
</svg>

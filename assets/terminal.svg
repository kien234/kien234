<svg width="850" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .t-bg { fill: #0D1117; }
      .t-bar { fill: #161B22; }
      .t-dot-r { fill: #FF5F57; }
      .t-dot-y { fill: #FEBC2E; }
      .t-dot-g { fill: #28C840; }
      .t-title { font-family: monospace; font-size: 12px; fill: #555; }
      
      .t-line {
        font-family: monospace;
        font-size: 14px;
        fill: #A9B1D6;
        opacity: 0;
      }
      .t-prompt { fill: #00FF9D; }
      .t-key { fill: #7000FF; }
      .t-val { fill: #00F2FF; }
      .t-str { fill: #F7768E; }
      .t-comment { fill: #555; font-style: italic; }
      
      .l1 { animation: typeIn 0.3s ease forwards 0.2s; }
      .l2 { animation: typeIn 0.3s ease forwards 0.5s; }
      .l3 { animation: typeIn 0.3s ease forwards 0.8s; }
      .l4 { animation: typeIn 0.3s ease forwards 1.1s; }
      .l5 { animation: typeIn 0.3s ease forwards 1.4s; }
      .l6 { animation: typeIn 0.3s ease forwards 1.7s; }
      .l7 { animation: typeIn 0.3s ease forwards 2.0s; }
      .l8 { animation: typeIn 0.3s ease forwards 2.3s; }
      .l9 { animation: typeIn 0.3s ease forwards 2.6s; }
      
      @keyframes typeIn {
        0% { opacity: 0; transform: translateX(-5px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      .cursor-term {
        fill: #00FF9D;
        animation: blink2 1s step-end infinite 2.8s;
        opacity: 0;
      }
      @keyframes blink2 {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      .t-border {
        stroke: #30363D;
        stroke-width: 1;
        fill: none;
      }
    </style>
  </defs>
  
  <!-- Terminal window -->
  <rect class="t-bg" width="850" height="280" rx="10" />
  <rect class="t-border" x="0.5" y="0.5" width="849" height="279" rx="10" />
  
  <!-- Title bar -->
  <rect class="t-bar" width="850" height="35" rx="10" />
  <rect class="t-bar" y="25" width="850" height="10" />
  <line x1="0" y1="35" x2="850" y2="35" stroke="#30363D" stroke-width="1" />
  
  <!-- Traffic lights -->
  <circle class="t-dot-r" cx="20" cy="18" r="6" />
  <circle class="t-dot-y" cx="40" cy="18" r="6" />
  <circle class="t-dot-g" cx="60" cy="18" r="6" />
  
  <!-- Terminal title -->
  <text class="t-title" x="425" y="22" text-anchor="middle">kien@neural-core: ~/about</text>
  
  <!-- Terminal content -->
  <text class="t-line l1" x="20" y="65">
    <tspan class="t-prompt">$</tspan>
    <tspan class="t-val"> cat about.json</tspan>
  </text>
  
  <text class="t-line l2" x="20" y="90">
    <tspan class="t-comment">// Accessing neural profile data...</tspan>
  </text>
  
  <text class="t-line l3" x="20" y="115">
    <tspan fill="#A9B1D6">{</tspan>
  </text>
  
  <text class="t-line l4" x="40" y="140">
    <tspan class="t-key">"name"</tspan>
    <tspan fill="#A9B1D6">: </tspan>
    <tspan class="t-str">"Nguyen Van Kien"</tspan>
    <tspan fill="#A9B1D6">,</tspan>
  </text>
  
  <text class="t-line l5" x="40" y="165">
    <tspan class="t-key">"role"</tspan>
    <tspan fill="#A9B1D6">: </tspan>
    <tspan class="t-str">"AI-Augmented Developer"</tspan>
    <tspan fill="#A9B1D6">,</tspan>
  </text>
  
  <text class="t-line l6" x="40" y="190">
    <tspan class="t-key">"philosophy"</tspan>
    <tspan fill="#A9B1D6">: </tspan>
    <tspan class="t-str">"Manual coding is obsolete"</tspan>
    <tspan fill="#A9B1D6">,</tspan>
  </text>
  
  <text class="t-line l7" x="40" y="215">
    <tspan class="t-key">"ai_dependency"</tspan>
    <tspan fill="#A9B1D6">: </tspan>
    <tspan class="t-val">100</tspan>
    <tspan fill="#A9B1D6">,</tspan>
  </text>
  
  <text class="t-line l8" x="40" y="240">
    <tspan class="t-key">"status"</tspan>
    <tspan fill="#A9B1D6">: </tspan>
    <tspan class="t-str">"OPERATIONAL"</tspan>
  </text>
  
  <text class="t-line l9" x="20" y="265">
    <tspan fill="#A9B1D6">}</tspan>
    <tspan class="cursor-term" dx="10">_</tspan>
  </text>
</svg>

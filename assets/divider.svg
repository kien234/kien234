<svg width="850" height="8" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="20%" stop-color="#00F2FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="80%" stop-color="#F7768E" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <style>
      .divline {
        stroke: url(#dg);
        stroke-width: 2;
        animation: shimmer 3s ease-in-out infinite;
        opacity: 0.7;
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  <line class="divline" x1="50" y1="4" x2="800" y2="4" />
</svg>
